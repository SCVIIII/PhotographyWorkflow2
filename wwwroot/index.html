<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棠屿·朝夕 | 摄影与纪实</title>
    <style>
        /* --- 全局与背景 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            background: linear-gradient(135deg, #eee3e3 0%, #e1cdcd 100%);
            background-attachment: fixed;
            color: #5c4b4b;
        }

        /* --- 个人主页专属样式 --- */
        #landing-view {
            max-width: 800px;
            margin: 40px auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px);
        }

        /* 建筑学几何 Logo */
        .geo-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 30px;
            position: relative;
        }

            .geo-logo::before {
                content: '';
                position: absolute;
                width: 45px;
                height: 45px;
                border: 2px solid #5c4b4b;
                border-radius: 50%;
                top: 0;
                left: 0;
            }

            .geo-logo::after {
                content: '';
                position: absolute;
                width: 45px;
                height: 45px;
                background: rgba(92,75,75,0.15);
                border-radius: 50%;
                bottom: 0;
                right: 0;
                backdrop-filter: blur(4px);
            }

        .landing-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
        }

        .landing-slogan {
            font-size: 16px;
            font-family: 'Georgia', serif;
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .landing-bio {
            font-size: 14px;
            line-height: 2;
            margin-bottom: 40px;
            color: #665959;
            border-top: 1px solid rgba(92, 75, 75, 0.1);
            border-bottom: 1px solid rgba(92, 75, 75, 0.1);
            padding: 20px 0;
            display: inline-block;
        }

        /* 作品展柜 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

            .portfolio-grid img {
                width: 100%;
                height: 250px;
                object-fit: cover;
                border-radius: 8px;
                transition: 0.4s;
                box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            }

                .portfolio-grid img:hover {
                    transform: translateY(-5px);
                    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
                }

        .landing-contact {
            font-size: 13px;
            color: #776a6a;
            line-height: 1.8;
        }

            .landing-contact strong {
                color: #5c4b4b;
                font-size: 15px;
            }

        @media (max-width: 600px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }

                .portfolio-grid img {
                    height: 200px;
                }

            #landing-view {
                padding: 40px 20px;
            }
        }

        /* --- 原画廊专属样式 --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .slogan-area {
            text-align: left;
        }

        .hero-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: 14px;
            margin: 0;
            font-family: 'Georgia', serif;
            font-style: italic;
            opacity: 0.8;
        }

        .instruction-area {
            text-align: right;
        }

            .instruction-area h2 {
                font-size: 18px;
                margin: 0 0 5px 0;
                font-weight: 500;
                letter-spacing: 1px;
            }

            .instruction-area p {
                font-size: 13px;
                margin: 0;
                opacity: 0.7;
            }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        .photo-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: zoom-in;
            transition: transform 0.4s, box-shadow 0.4s ease;
        }

            .photo-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            }

            .photo-card img {
                width: 100%;
                height: 240px;
                object-fit: cover;
                display: block;
            }

        .download-all-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(92, 75, 75, 0.8);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

            .download-all-btn:hover {
                background-color: rgba(92, 75, 75, 1);
                transform: translateY(-2px);
            }

        /* --- 灯箱与底边 --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: opacity 0.2s ease-in-out;
            object-fit: contain;
        }

        .top-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 2001;
        }

        .control-btn {
            color: rgba(255, 255, 255, 0.6);
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: none;
            transition: 0.3s;
            line-height: 1;
        }

            .control-btn.close-btn {
                font-size: 42px;
            }

            .control-btn:hover {
                color: rgba(255, 255, 255, 1);
                transform: scale(1.15);
            }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 36px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 20px;
            transition: 0.3s;
            z-index: 2001;
        }

            .nav-btn:hover {
                color: white;
                transform: translateY(-50%) scale(1.1);
            }

        .prev-btn {
            left: 10px;
        }

        .next-btn {
            right: 10px;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            z-index: 2002;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            text-align: center;
            padding: 40px 20px 20px 20px;
            color: #8c7e7e;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.3);
            margin-top: 40px;
        }

            footer a {
                color: #8c7e7e;
                text-decoration: none;
                border-bottom: 1px solid rgba(140,126,126,0.3);
                padding-bottom: 2px;
                transition: 0.3s;
            }

                footer a:hover {
                    color: #5c4b4b;
                    border-bottom-color: #5c4b4b;
                }
    </style>
</head>
<body>

    <div id="landing-view">
        <div class="geo-logo"></div>
        <h1 class="landing-title">棠屿·朝夕</h1>
        <p class="landing-slogan">用建筑的秩序，重构光影的温度。</p>

        <div class="landing-bio">
            独立摄影师 | 前建筑电气设计<br>
            专注于人像 | 记录美好or创造美好 <br>
            坐标：江浙沪 ⇄ 昆明/大理<br>
        </div>

        <div class="portfolio-grid">
            <img src="/Pictures/MEITU_20260428_233946693.jpg" alt="Portfolio 1">
            <img src="/Pictures/MEITU_20260428_234926520.jpg" alt="Portfolio 2">
            <img src="/Pictures/外景-26.jpg" alt="Portfolio 3">
        </div>

        <div class="landing-contact">
            <p>预约拍摄 / 商业合作请联系：</p>
            <p><strong>WeChat: </strong> dawntoodusk0417</p>
            <p><strong>Xiaohongshu: </strong> 棠屿朝夕时光小集</p>
        </div>
    </div>

    <div id="gallery-view" style="display: none;">
        <div class="header-container">
            <div class="slogan-area">
                <h1 class="hero-title">倘若与你，收集朝夕</h1>
                <p class="hero-subtitle">With you, dawn to dusk.</p>
            </div>
            <div class="instruction-area">
                <h2 id="album-display-name">棠屿·朝夕 | 专属画廊</h2>
                <p style="margin-bottom: 10px;">点击照片进入沉浸式浏览</p>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button class="download-all-btn" style="margin-top: 0; background-color: rgba(255,255,255,0.6); color: #5c4b4b; border: 1px solid rgba(92,75,75,0.2);" onclick="window.location.href='/'">
                        🏠 摄影师主页
                    </button>
                    <button class="download-all-btn" id="downloadAllBtn" style="display:none; margin-top: 0;">
                        📦 一键下载全部精修
                    </button>
                </div>
            </div>
        </div>
        <div class="gallery" id="gallery"></div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div id="loadingSpinner" class="loader"></div>
        <div class="top-controls">
            <a id="downloadBtn" class="control-btn" href="#" title="保存原图" onclick="event.stopPropagation();" style="display:none;">&#10515;</a>
            <button class="control-btn close-btn" onclick="closeLightbox(); event.stopPropagation();" title="关闭 (Esc)">&times;</button>
        </div>
        <button class="nav-btn prev-btn" onclick="event.stopPropagation(); changePhoto(-1)">&#10094;</button>
        <img id="lightboxImg" class="lightbox-img" src="" alt="全屏预览" onclick="event.stopPropagation();">
        <button class="nav-btn next-btn" onclick="event.stopPropagation(); changePhoto(1)">&#10095;</button>
    </div>

    <footer>
        <p>棠屿·朝夕 © 2026 | <a href="https://beian.miit.gov.cn/" target="_blank">沪ICP备2026015126号-1</a></p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentAlbum = urlParams.get('album');

        // 💡 智能路由控制
        if (!currentAlbum) {
            // 没有相册参数，停留在主页视图
            document.getElementById('landing-view').style.display = 'block';
        } else {
            // 有相册参数，切换到画廊视图并拉取数据
            document.getElementById('landing-view').style.display = 'none';
            document.getElementById('gallery-view').style.display = 'block';
            loadPhotos();
        }

        // --- 画廊核心逻辑 ---
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const spinner = document.getElementById('loadingSpinner');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        let allPhotos = [];
        let currentIndex = 0;
        let currentLoadTicket = 0;

        async function loadPhotos() {
            try {
                //const response = await fetch(`/api/photos/list?album=${currentAlbum}`);
                // 💡 明确告诉后端：我是看图画廊，请放行我的请求，不要受选片开关的误伤
                const response = await fetch(`/api/photos/list?album=${currentAlbum}&mode=gallery`);
                if (!response.ok) {
                    document.getElementById('gallery-view').innerHTML = "<div style='text-align:center; margin-top:100px; color:#5c4b4b;'><h2>时光胶囊已封存 🕰️</h2><p>该链接已过有效期或相册不存在</p></div>";
                    return;
                }

                const data = await response.json();
                allPhotos = data.photos;

                if (data.name) document.getElementById('album-display-name').innerText = data.name;

                if (data.canDownload) {
                    downloadAllBtn.style.display = 'inline-block';
                    downloadBtn.style.display = 'block';
                }

                gallery.innerHTML = '';
                allPhotos.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `<img src="${item.thumbUrl}" loading="lazy" alt="精修成品">`;
                    card.onclick = () => openLightbox(index);
                    gallery.appendChild(card);
                });

                downloadAllBtn.onclick = () => {
                    downloadAllBtn.innerHTML = '⏳ 正在云端打包...';
                    downloadAllBtn.style.pointerEvents = 'none';
                    window.location.href = `/api/photos/download-all?album=${currentAlbum}`;
                    setTimeout(() => {
                        downloadAllBtn.innerHTML = '📦 一键下载全部精修';
                        downloadAllBtn.style.pointerEvents = 'auto';
                    }, 5000);
                };

            } catch (error) { console.error("加载失败:", error); }
        }

        function openLightbox(index) {
            currentIndex = index;
            currentLoadTicket++;
            lightboxImg.style.opacity = '1';
            spinner.style.display = 'none';
            lightboxImg.src = allPhotos[currentIndex].displayUrl;
            downloadBtn.href = allPhotos[currentIndex].downloadUrl;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            preloadAdjacent();
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + allPhotos.length) % allPhotos.length;
            const myTicket = ++currentLoadTicket;
            lightboxImg.style.opacity = '0.3';
            spinner.style.display = 'block';

            const targetUrl = allPhotos[currentIndex].displayUrl;
            downloadBtn.href = allPhotos[currentIndex].downloadUrl;

            const tempImg = new Image();
            tempImg.onload = function () {
                if (myTicket !== currentLoadTicket) return;
                lightboxImg.src = targetUrl;
                lightboxImg.style.opacity = '1';
                spinner.style.display = 'none';
                preloadAdjacent();
            };
            tempImg.src = targetUrl;
        }

        function preloadAdjacent() {
            if (allPhotos.length <= 1) return;
            const nextIdx = (currentIndex + 1) % allPhotos.length;
            const prevIdx = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
            new Image().src = allPhotos[nextIdx].displayUrl;
            new Image().src = allPhotos[prevIdx].displayUrl;
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
            currentLoadTicket++;
        }

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>
</html>
