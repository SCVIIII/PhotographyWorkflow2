<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棠屿·朝夕 | 协作选片</title>
    <style>
        /* --- 全局与基础审美 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px 15px 100px 15px;
            background: linear-gradient(135deg, #eee3e3 0%, #e1cdcd 100%);
            min-height: 100vh;
            background-attachment: fixed;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .slogan-area {
            text-align: left;
            color: #5c4b4b;
        }

        .hero-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: 14px;
            margin: 5px 0 0 0;
            font-family: 'Georgia', serif;
            font-style: italic;
            opacity: 0.8;
        }

        /* 顶部返回主页按钮 */
        .home-btn {
            background-color: rgba(255,255,255,0.6);
            color: #5c4b4b;
            border: 1px solid rgba(92,75,75,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-decoration: none;
            display: inline-block;
        }

            .home-btn:hover {
                background-color: #fff;
                transform: translateY(-2px);
            }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .photo-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }

            .photo-card img {
                width: 100%;
                height: 200px;
                object-fit: cover;
                display: block;
            }

        /* SVG 矢量对角线水印层 */
        .watermark-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><text x='50%' y='50%' transform='rotate(-30 80 80)' fill='rgba(255,255,255,0.95)' font-size='15' font-family='sans-serif' font-weight='300' text-anchor='middle'>棠屿 tangisle.top</text></svg>");
        }

        .select-badge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(92, 75, 75, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .photo-card.is-selected .select-badge {
            display: flex;
        }

        /* --- 底部选片工具栏 --- */
        .selection-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 25px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .selection-info {
            color: #5c4b4b;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .submit-btn {
            background: #5c4b4b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

            .submit-btn:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

        .reset-btn {
            background: rgba(255, 255, 255, 0.5);
            color: #8c7e7e;
            border: 1px solid rgba(92, 75, 75, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

            .reset-btn:hover {
                background: #fff;
                color: #d9534f;
                border-color: #d9534f;
            }

        /* --- 灯箱 --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .lightbox-img-wrapper {
            position: relative;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            display: block;
            transition: opacity 0.2s ease-in-out;
            /* 💡 核心防盗魔法：彻底剥夺图片的点击、长按、选中权限 */
            pointer-events: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 💡 加载动画圈圈 */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            z-index: 2002;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 36px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 20px;
            transition: 0.3s;
            z-index: 2001;
        }

        .prev-btn {
            left: 10px;
        }

        .next-btn {
            right: 10px;
        }

        .nav-btn:hover {
            color: rgba(255, 255, 255, 1);
            transform: translateY(-50%) scale(1.1);
        }

        .heart-btn {
            position: absolute;
            bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2001;
        }

            .heart-btn.active {
                background: #fff;
                color: #5c4b4b;
            }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 2001;
        }

        /* --- 弹窗 --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 80%;
            max-width: 350px;
            text-align: center;
        }

            .modal-content input {
                width: 100%;
                padding: 12px;
                margin: 20px 0;
                border: 1px solid #ddd;
                border-radius: 8px;
                box-sizing: border-box;
                text-align: center;
            }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="slogan-area">
            <h1 class="hero-title">棠屿·选片间</h1>
            <p class="hero-subtitle">Selection Space.</p>
        </div>
        <div>
            <button class="home-btn" onclick="window.location.href='/'">🏠 摄影师主页</button>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="selection-bar" id="selectionBar">
        <div class="selection-info">已选入 <span id="count-text">0</span> 张照片</div>
        <div class="btn-group">
            <button class="reset-btn" id="resetBtn" onclick="resetSelection()" style="display: none;">清空已选</button>
            <button class="submit-btn" id="submitBtn" onclick="openSubmitModal()" disabled>提交清单</button>
        </div>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn" onclick="closeLightbox(); event.stopPropagation();">&times;</span>
        <button class="nav-btn prev-btn" onclick="event.stopPropagation(); changePhoto(-1)">&#10094;</button>

        <div class="lightbox-img-wrapper" onclick="event.stopPropagation();" oncontextmenu="return false;" style="-webkit-touch-callout: none;">
            <div id="loadingSpinner" class="loader"></div>
            <img id="lightboxImg" class="lightbox-img" src="">
            <div class="watermark-layer" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'300\' height=\'300\'><text x=\'50%\' y=\'50%\' transform=\'rotate(-30 150 150)\' fill=\'rgba(255,255,255,0.12)\' font-size=\'18\' font-family=\'Georgia, STSong, serif\' font-weight=\'200\' letter-spacing=\'5\' text-anchor=\'middle\'>棠屿 tangisle.top</text></svg>');"></div>
        </div>

       

        <button class="nav-btn next-btn" onclick="event.stopPropagation(); changePhoto(1)">&#10095;</button>
        <button id="heartBtn" class="heart-btn" onclick="toggleSelect(event)">❤️ 选入这张</button>
    </div>

    <div id="submitModal" class="modal">
        <div class="modal-content">
            <h3>请留下您的称呼</h3>
            <p style="font-size: 13px; color: #888;">例如：模特小A / 5.20选图</p>
            <input type="text" id="userName" placeholder="您的姓名或身份">
            <button class="submit-btn" style="width: 100%;" onclick="finalSubmit()">确认提交记录</button>
            <button style="margin-top: 15px; color: #999; background:none; border:none; cursor:pointer;" onclick="closeModal()">返回修改</button>
        </div>
    </div>

    <script>
        let allPhotos = [];
        let selectedKeys = new Set();
        let currentIndex = 0;
        let currentLoadTicket = 0; // 用于处理网络竞态条件的票据

        const urlParams = new URLSearchParams(window.location.search);
        const albumId = urlParams.get('album');

        async function load() {
            if (!albumId) {
                document.getElementById('gallery').innerHTML = "<div style='text-align:center; margin-top:50px;'>参数错误，请通过正确链接访问。</div>";
                return;
            }

            //const res = await fetch(`/api/photos/list?album=${albumId}`);
            // 💡 明确告诉后端：我是选片间，请对我执行选片权限校验
            const res = await fetch(`/api/photos/list?album=${albumId}&mode=select`);

            if (!res.ok) {
                document.getElementById('gallery').innerHTML = "<div style='text-align:center; margin-top:50px;'>相册已过期或不存在。</div>";
                return;
            }

            const data = await res.json();
            const gallery = document.getElementById('gallery');

            // 💡 核心隐私保护与优雅降级逻辑
            if (data.canSelect === false) {
                document.getElementById('selectionBar').style.display = 'none';
                gallery.style.display = 'block'; // 解除网格布局
                gallery.innerHTML = `
                        <div style="max-width: 450px; margin: 80px auto; text-align: center; background: rgba(255, 255, 255, 0.4); padding: 50px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); backdrop-filter: blur(10px);">
                            <div style="font-size: 32px; margin-bottom: 20px;">☕</div>
                            <h2 style="font-size: 20px; color: #5c4b4b; font-weight: 500; letter-spacing: 2px; margin-bottom: 10px;">选片已结束</h2>
                            <p style="font-size: 14px; color: #776a6a; margin-bottom: 30px; line-height: 1.8;">摄影师正在为您精心修饰中<br>请耐心等待成品交付</p>
                            <button onclick="window.location.href='/'" style="background: #5c4b4b; color: white; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; letter-spacing: 1px;">返回主页</button>
                        </div>
                    `;
                return; // 直接中止，绝不渲染后续照片
            }

            // 💡 正常照片渲染
            allPhotos = data.photos;

            if (allPhotos.length === 0) {
                gallery.innerHTML = "<div style='text-align:center; margin-top:50px;'>相册中暂时没有照片。</div>";
                return;
            }

            allPhotos.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                        <img src="${p.thumbUrl}" loading="lazy">
                        <div class="watermark-layer"></div>
                        <div class="select-badge">✓</div>
                    `;
                card.onclick = () => openLightbox(index);
                gallery.appendChild(card);
            });
        }

        // --- 重置与 UI 更新 ---
        function resetSelection() {
            if (selectedKeys.size === 0) return;
            if (!confirm("确定要取消勾选所有已选的照片吗？")) return;
            selectedKeys.clear();
            document.querySelectorAll('.photo-card').forEach(card => card.classList.remove('is-selected'));
            updateLightboxView();
            updateUI();
        }

        function updateLightboxView() {
            const photo = allPhotos[currentIndex];
            const heart = document.getElementById('heartBtn');
            if (selectedKeys.has(photo.key)) {
                heart.classList.add('active'); heart.innerHTML = '✨ 已选入清单';
            } else {
                heart.classList.remove('active'); heart.innerHTML = '❤️ 选入这张';
            }
        }

        function updateUI() {
            const count = selectedKeys.size;
            document.getElementById('count-text').innerText = count;
            document.getElementById('submitBtn').disabled = count === 0;
            document.getElementById('resetBtn').style.display = count > 0 ? 'inline-block' : 'none';
        }

        // --- 灯箱浏览与丝滑加载 ---
        function openLightbox(index) {
            currentIndex = index;
            currentLoadTicket++;

            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.style.opacity = '1';
            document.getElementById('loadingSpinner').style.display = 'none';
            lightboxImg.src = allPhotos[currentIndex].displayUrl;

            updateLightboxView();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            preloadAdjacent();
        }

        function changePhoto(step) {
            let nextIndex = currentIndex + step;

            // 💡 边界拦截
            if (nextIndex >= allPhotos.length) {
                alert("✨ 您已看完所有照片，可以点击底部提交清单啦");
                return;
            }
            if (nextIndex < 0) {
                alert("这是第一张照片啦");
                return;
            }

            currentIndex = nextIndex;
            const myTicket = ++currentLoadTicket;

            const lightboxImg = document.getElementById('lightboxImg');
            const spinner = document.getElementById('loadingSpinner');

            // 变暗，显示 Loading
            lightboxImg.style.opacity = '0.3';
            spinner.style.display = 'block';

            const targetUrl = allPhotos[currentIndex].displayUrl;

            // 后台静默加载图片
            const tempImg = new Image();
            tempImg.onload = function () {
                if (myTicket !== currentLoadTicket) return; // 防止狂点导致的乱序
                lightboxImg.src = targetUrl;
                lightboxImg.style.opacity = '1';
                spinner.style.display = 'none';
                updateLightboxView();
                preloadAdjacent();
            };
            tempImg.src = targetUrl;
        }

        function preloadAdjacent() {
            if (currentIndex + 1 < allPhotos.length) new Image().src = allPhotos[currentIndex + 1].displayUrl;
            if (currentIndex - 1 >= 0) new Image().src = allPhotos[currentIndex - 1].displayUrl;
        }

        function toggleSelect(e) {
            e.stopPropagation();
            const photo = allPhotos[currentIndex];
            const heart = document.getElementById('heartBtn');
            const card = document.getElementById(`card-${currentIndex}`);

            if (selectedKeys.has(photo.key)) {
                selectedKeys.delete(photo.key);
                heart.classList.remove('active'); heart.innerHTML = '❤️ 选入这张';
                card.classList.remove('is-selected');
            } else {
                selectedKeys.add(photo.key);
                heart.classList.add('active'); heart.innerHTML = '✨ 已选入清单';
                card.classList.add('is-selected');
            }
            updateUI();
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
            currentLoadTicket++; // 废弃正在加载的请求
        }

        // --- 键盘快捷键支持 ---
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        // --- 提交操作 ---
        function openSubmitModal() { document.getElementById('submitModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('submitModal').style.display = 'none'; }

        async function finalSubmit() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) return alert("请输入您的称呼");
            const submitBtn = document.querySelector('#submitModal .submit-btn');
            submitBtn.disabled = true;
            const payload = {
                albumId: albumId,
                phoneNumber: userName,
                selectedPhotos: Array.from(selectedKeys).join(','),
                retentionDays: 7
            };
            try {
                const res = await fetch('/api/photos/submit-selection', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { alert(`✅ 提交成功！\n\n摄影师已收到您的选片清单，即将开始为您精修。`); closeModal(); }
                else { alert("提交失败，选片通道可能已关闭"); }
            } catch (err) { alert("网络提交失败"); }
            finally { submitBtn.disabled = false; }
        }

        load();
    </script>
</body>
</html>
