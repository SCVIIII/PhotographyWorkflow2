<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棠屿·朝夕 | 专属画廊</title>
    <style>
        /* --- 全局与背景 --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            background: linear-gradient(135deg, #eee3e3 0%, #e1cdcd 100%);
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* --- 头部布局 --- */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .slogan-area {
            text-align: left;
            color: #5c4b4b;
        }

        .hero-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .hero-subtitle {
            font-size: 14px;
            margin: 0;
            font-family: 'Georgia', serif;
            font-style: italic;
            opacity: 0.8;
        }

        .instruction-area {
            text-align: right;
            color: #5c4b4b;
        }

            .instruction-area h2 {
                font-size: 18px;
                margin: 0 0 5px 0;
                font-weight: 500;
                letter-spacing: 1px;
            }

            .instruction-area p {
                font-size: 13px;
                margin: 0;
                opacity: 0.7;
            }

        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .slogan-area, .instruction-area {
                text-align: center;
            }
        }

        /* --- 画廊网格 --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding-bottom: 40px;
        }

        .photo-card {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: zoom-in;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
        }

            .photo-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            }

            .photo-card img {
                width: 100%;
                height: 240px;
                object-fit: cover;
                display: block;
            }

        /* --- 灯箱与加载动画 --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: opacity 0.2s ease-in-out;
            object-fit: contain;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            position: absolute;
            display: none;
            z-index: 2002;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- 控制按钮 --- */
        .top-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 2001;
        }

        .control-btn {
            color: rgba(255, 255, 255, 0.6);
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: none;
            transition: 0.3s;
            line-height: 1;
        }

            .control-btn.close-btn {
                font-size: 42px;
            }

            .control-btn:hover {
                color: rgba(255, 255, 255, 1);
                transform: scale(1.15);
            }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 36px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 20px;
            transition: 0.3s;
            z-index: 2001;
        }

            .nav-btn:hover {
                color: white;
                transform: translateY(-50%) scale(1.1);
            }

        .prev-btn {
            left: 10px;
        }

        .next-btn {
            right: 10px;
        }

        .download-all-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: rgba(92, 75, 75, 0.8);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

            .download-all-btn:hover {
                background-color: rgba(92, 75, 75, 1);
                transform: translateY(-2px);
            }

        /* --- 底部备案号 --- */
        footer {
            text-align: center;
            padding: 40px 20px 20px 20px;
            color: #8c7e7e;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.3);
            margin-top: 40px;
        }

            footer a {
                color: #8c7e7e;
                text-decoration: none;
                border-bottom: 1px solid rgba(140,126,126,0.3);
                padding-bottom: 2px;
                transition: 0.3s;
            }

                footer a:hover {
                    color: #5c4b4b;
                    border-bottom-color: #5c4b4b;
                }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="slogan-area">
            <h1 class="hero-title">倘若与你，收集朝夕</h1>
            <p class="hero-subtitle">With you, dawn to dusk.</p>
        </div>
        <div class="instruction-area">
            <h2 id="album-display-name">棠屿·朝夕 | 专属画廊</h2>
            <p>点击照片进入沉浸式浏览</p>
            <button class="download-all-btn" id="downloadAllBtn" style="display:none;">
                📦 一键下载全部精修
            </button>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div id="loadingSpinner" class="loader"></div>

        <div class="top-controls">
            <a id="downloadBtn" class="control-btn" href="#" title="保存原图" onclick="event.stopPropagation();" style="display:none;">&#10515;</a>
            <button class="control-btn close-btn" onclick="closeLightbox(); event.stopPropagation();" title="关闭 (Esc)">&times;</button>
        </div>

        <button class="nav-btn prev-btn" onclick="event.stopPropagation(); changePhoto(-1)" title="上一张 (左方向键)">&#10094;</button>
        <img id="lightboxImg" class="lightbox-img" src="" alt="全屏预览" onclick="event.stopPropagation();">
        <button class="nav-btn next-btn" onclick="event.stopPropagation(); changePhoto(1)" title="下一张 (右方向键)">&#10095;</button>
    </div>

    <footer>
        <p>棠屿·朝夕 © 2026 | <a href="https://beian.miit.gov.cn/" target="_blank">沪ICP备2026015126号-1</a></p>
    </footer>

    <script>
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const spinner = document.getElementById('loadingSpinner');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        let allPhotos = [];
        let currentIndex = 0;
        let currentLoadTicket = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const currentAlbum = urlParams.get('album');

        async function loadPhotos() {
            if (!currentAlbum) {
                document.body.innerHTML = "<div style='text-align:center; margin-top:100px; color:#5c4b4b;'><h2>画廊通道尚未开启 🥀</h2><p>请联系摄影师获取您的专属链接</p></div>";
                return;
            }

            try {
                const response = await fetch(`/api/photos/list?album=${currentAlbum}`);
                if (!response.ok) {
                    document.body.innerHTML = "<div style='text-align:center; margin-top:100px; color:#5c4b4b;'><h2>时光胶囊已封存 🕰️</h2><p>该链接已过有效期或相册不存在</p></div>";
                    return;
                }

                const data = await response.json();
                allPhotos = data.photos;

                // 设置相册标题
                if (data.name) document.getElementById('album-display-name').innerText = data.name;

                // 核心权限联动：控制一键下载和单张下载按钮的显示
                if (data.canDownload) {
                    downloadAllBtn.style.display = 'inline-block';
                    downloadBtn.style.display = 'block';
                }

                gallery.innerHTML = '';
                allPhotos.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `<img src="${item.thumbUrl}" loading="lazy" alt="精修成品">`;
                    card.onclick = () => openLightbox(index);
                    gallery.appendChild(card);
                });

                downloadAllBtn.onclick = () => {
                    downloadAllBtn.innerHTML = '⏳ 正在云端打包...';
                    downloadAllBtn.style.pointerEvents = 'none';
                    window.location.href = `/api/photos/download-all?album=${currentAlbum}`;
                    setTimeout(() => {
                        downloadAllBtn.innerHTML = '📦 一键下载全部精修';
                        downloadAllBtn.style.pointerEvents = 'auto';
                    }, 5000);
                };

            } catch (error) {
                console.error("加载失败:", error);
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            currentLoadTicket++;

            lightboxImg.style.opacity = '1';
            spinner.style.display = 'none';
            lightboxImg.src = allPhotos[currentIndex].displayUrl;
            downloadBtn.href = allPhotos[currentIndex].downloadUrl;

            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            preloadAdjacent();
        }

        function changePhoto(step) {
            currentIndex = (currentIndex + step + allPhotos.length) % allPhotos.length;
            const myTicket = ++currentLoadTicket;

            lightboxImg.style.opacity = '0.3';
            spinner.style.display = 'block';

            const targetUrl = allPhotos[currentIndex].displayUrl;
            const targetDownload = allPhotos[currentIndex].downloadUrl;

            const tempImg = new Image();
            tempImg.onload = function () {
                if (myTicket !== currentLoadTicket) return;

                lightboxImg.src = targetUrl;
                downloadBtn.href = targetDownload;
                lightboxImg.style.opacity = '1';
                spinner.style.display = 'none';
                preloadAdjacent();
            };
            tempImg.src = targetUrl;
        }

        function preloadAdjacent() {
            if (allPhotos.length <= 1) return;
            const nextIdx = (currentIndex + 1) % allPhotos.length;
            const prevIdx = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
            new Image().src = allPhotos[nextIdx].displayUrl;
            new Image().src = allPhotos[prevIdx].displayUrl;
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
            currentLoadTicket++;
        }

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changePhoto(-1);
                if (e.key === 'ArrowRight') changePhoto(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });

        loadPhotos();
    </script>
</body>
</html>
